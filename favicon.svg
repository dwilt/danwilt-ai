<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg-glow" cx="0.5" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#161b2e"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="top-glow" cx="0.4" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="rgba(91,127,199,0.25)"/>
      <stop offset="60%" stop-color="rgba(91,127,199,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Dark blue background -->
  <rect width="64" height="64" fill="url(#bg-glow)"/>

  <!-- Angled vector shapes (like stats bg) -->
  <polygon points="0,20 28,0 32,0 4,20" fill="rgba(91,127,199,0.06)"/>
  <polygon points="38,0 64,0 64,18 42,0" fill="rgba(91,127,199,0.04)"/>
  <polygon points="0,44 0,36 20,48 12,48" fill="rgba(91,127,199,0.05)"/>
  <polygon points="64,30 64,50 44,38" fill="rgba(91,127,199,0.04)"/>
  <polygon points="30,64 50,64 64,52 64,58" fill="rgba(91,127,199,0.05)"/>
  <polygon points="0,58 0,64 14,64" fill="rgba(91,127,199,0.03)"/>

  <!-- Light gradient glow overlay -->
  <rect width="64" height="64" fill="url(#top-glow)"/>

  <!-- dw text -->
  <text x="50%" y="44" font-family="monospace" font-weight="600" font-size="28" fill="#ffffff" letter-spacing="-1" text-anchor="middle">dw</text>
</svg>